
<div class="{{ list_container_class|default:'list-group' }}">
    {% for item in items %}
        {% include card_template|default:'partials/cards/_default_list_card.html' with item=item %}
    {% empty %}
        {% include empty_template|default:'partials/cards/_default_empty_state.html' with empty_message=empty_message %}
    {% endfor %}
</div>
