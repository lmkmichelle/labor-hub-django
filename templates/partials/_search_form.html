<form method="GET" class="max-w-2xl mb-3 mx-auto">
    <div class="flex shadow-xs rounded-base -space-x-0.5">
        <label for="search-dropdown"
               class="block mb-2.5 text-sm font-medium text-heading sr-only">Filter</label>
        <button id="dropdown-button"
                data-dropdown-toggle="dropdown"
                type="button"
                class="inline-flex items-center shrink-0 z-10 text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-s-base text-sm px-4 py-2.5 focus:outline-none">
            {% for filter in search_filters %}
                {% if filter.value == filter_type %}{{ filter.label }}{% endif %}
            {% endfor %}
            <svg class="w-4 h-4 ms-1.5"
                 aria-hidden="true"
                 xmlns="http://www.w3.org/2000/svg"
                 width="24"
                 height="24"
                 fill="none"
                 viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7" />
            </svg>
        </button>
        <div id="dropdown"
             class="z-10 hidden bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44">
            <ul class="p-2 text-sm text-body font-medium list-none mt-0"
                aria-labelledby="dropdown-button">
                {% if search_filters %}
                    {% for filter in search_filters %}
                        <li>
                            <button type="submit"
                                    name="filter"
                                    value="{{ filter.value }}"
                                    class="block w-full text-left p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded-md
                                           {% if filter_type == filter.value %}bg-neutral-tertiary-medium text-heading{% endif %}">{{ filter.label }}</button>
                        </li>
                    {% endfor %}
                {% endif %}
            </ul>
        </div>
        <input type="search"
               id="search-dropdown"
               name="q"
               class="px-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm focus:ring-red-600 focus:border-red-600 block w-full placeholder:text-body"
               placeholder="{{ search_placeholder|default:'Search...' }}"
               value="{{ query }}">
        <button type="submit"
                class="inline-flex items-center text-white bg-red-700 hover:bg-red-800 box-border border border-transparent focus:ring-4 focus:ring-red-600 shadow-xs font-medium leading-5 rounded-e-base text-sm px-4 py-2.5 focus:outline-none">
            <svg class="w-4 h-4 me-1.5"
                 aria-hidden="true"
                 xmlns="http://www.w3.org/2000/svg"
                 width="24"
                 height="24"
                 fill="none"
                 viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
            </svg>
            Search
        </button>
    </div>
</form>
