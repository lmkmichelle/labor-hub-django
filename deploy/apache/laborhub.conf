# Apache reverse-proxy vhost for the Labor Hub Django app on Media3.
#
# Required modules: proxy, proxy_http, headers, ssl
#   Debian/Ubuntu: sudo a2enmod proxy proxy_http headers ssl
#   RHEL/CentOS:   ensure mod_proxy, mod_proxy_http, mod_headers, mod_ssl are loaded
#
# Install: place under the Media3 Apache conf dir (e.g. sites-available/), enable,
# and reload Apache. Replace ServerName, the SSL cert paths, and /var/www/laborhub
# to match the VM. On RHEL, replace ${APACHE_LOG_DIR} with an absolute log path.

<VirtualHost *:80>
    ServerName laborhub.cornell.edu
    # Force HTTPS (Django also redirects via SECURE_SSL_REDIRECT as a backstop).
    Redirect permanent / https://laborhub.cornell.edu/
</VirtualHost>

<VirtualHost *:443>
    ServerName laborhub.cornell.edu

    SSLEngine on
    SSLCertificateFile      /etc/ssl/media3/laborhub.cornell.edu.crt
    SSLCertificateKeyFile   /etc/ssl/media3/laborhub.cornell.edu.key
    # SSLCertificateChainFile /etc/ssl/media3/chain.crt   # if Media3 provides one

    # Tell Django (via SECURE_PROXY_SSL_HEADER) the original request was HTTPS.
    RequestHeader set X-Forwarded-Proto "https"

    # --- Static & media served directly by Apache from disk (not the app process) ---
    Alias /static/ /var/www/laborhub/staticfiles/
    <Directory /var/www/laborhub/staticfiles>
        Require all granted
        Options -Indexes
    </Directory>

    Alias /media/ /var/www/laborhub/media/
    <Directory /var/www/laborhub/media>
        Require all granted
        Options -Indexes
    </Directory>

    # --- Everything else is reverse-proxied to gunicorn ---
    ProxyPreserveHost On
    ProxyPass        /static/ !
    ProxyPass        /media/  !
    ProxyPass        /        http://127.0.0.1:8000/
    ProxyPassReverse /        http://127.0.0.1:8000/

    ErrorLog  ${APACHE_LOG_DIR}/laborhub_error.log
    CustomLog ${APACHE_LOG_DIR}/laborhub_access.log combined
</VirtualHost>
