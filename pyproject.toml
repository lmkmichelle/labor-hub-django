[tool.djlint]
# Advisory rules that do not apply to this server-rendered Django app:
#   H006 - <img> width/height hints (decorative/SVG icons)
#   H029 - lowercase form method values (Django treats GET/POST case-insensitively)
#   H030/H031 - meta description/keywords (not an SEO-driven public site)
# H021 (inline styles) is intentionally left ENABLED as the site-wide guard; the only
# legitimate inline styles live in the email template, which is wrapped in djlint:off.
ignore = "H006,H029,H030,H031"
