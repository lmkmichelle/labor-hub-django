name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Deterministic test settings that do not depend on a committed .env.
  DJANGO_SETTINGS_MODULE: nole.settings_test
  DJANGO_SECRET_KEY: ci-not-a-real-secret

jobs:
  lint:
    name: Lint templates (djlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Lint templates
        run: djlint templates --lint

  test:
    name: Tests (SQLite, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Django system checks
        run: python manage.py check
      - name: Run tests with coverage
        run: coverage run manage.py test --verbosity 2
      - name: Coverage report
        run: coverage report

  test-mysql:
    name: Tests (MySQL 8, production parity)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nole
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_ENGINE: mysql
      DATABASE_NAME: nole
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 3306
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Run tests on MySQL
        run: python manage.py test --verbosity 2
