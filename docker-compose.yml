services:
 db:
   image: mysql:8
   environment:
     MYSQL_DATABASE: ${DATABASE_NAME}
     MYSQL_USER: ${DATABASE_USERNAME}
     MYSQL_PASSWORD: ${DATABASE_PASSWORD}
     MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
   ports:
     - "3306:3306"
   volumes:
     - mysql_data:/var/lib/mysql
   env_file:
     - .env
   healthcheck:
     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DATABASE_ROOT_PASSWORD}"]
     interval: 5s
     timeout: 5s
     retries: 10

 django-web:
   build: .
   container_name: nole-app
   ports:
     - "8000:8000"
   depends_on:
     db:
       condition: service_healthy
   volumes:
     - .:/app/
   environment:
     DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
     DEBUG: ${DEBUG}
     DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
     DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
     # The app in the compose network always talks to the bundled "db" MySQL
     # service, so these are fixed here and override any local-dev values from
     # .env (e.g. a SQLite default) via docker-compose's environment precedence.
     DATABASE_ENGINE: mysql
     DATABASE_HOST: db
     DATABASE_PORT: "3306"
     DATABASE_NAME: ${DATABASE_NAME}
     DATABASE_USERNAME: ${DATABASE_USERNAME}
     DATABASE_PASSWORD: ${DATABASE_PASSWORD}
   env_file:
     - .env
volumes:
   mysql_data:
